<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="This website serves as a portfolio for Odysseas Ampatzis' photography.">

  <title>Escapism - Commissions</title> <!-- Title of the page, displayed in the browser tab. -->

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- JS -->
  <script src="assets/js/common.js"
          defer></script>

  <script src="assets/js/tasks.js" defer></script>
</head>

<body>

    <header></header>

    <main class="container py-5"> <!-- Main content area with padding. -->

        <section class="content-box"> <!-- Section for client commissions, styled with a content box class. -->

            <h1 class="text-center mb-4"> Client Commissions </h1>

            <form id="commissionForm"> <!-- Form for adding new client commissions, with an ID for JavaScript targeting. -->

            <div class="mb-3"> <!-- Form group for client name input, with margin-bottom for spacing. -->

                <label class="form-label"> <!-- Label for the client name input field, with Bootstrap's form-label class. -->
                    
                    Client Name
                    
                </label>

                <input
                    type="text"
                    id="clientName"
                    class="form-control"
                    aria-label="Client Name"
                    required
                    maxlength="50"
                    pattern="[A-Za-z ]+">

                <!-- Text input for the client's name, with Bootstrap's form-control class for styling -->

            </div>

            <div class="mb-3"> <!-- Form group for commission description, with margin-bottom for spacing. -->

                <label class="form-label"> Commission Description </label>

                <!-- Textarea for the commission description, with Bootstrap's form-control class for styling and an ID for JavaScript targeting. -->

                <textarea
                id="description"
                class="form-control"
                aria-label="Commission Description"
                required
                maxlength="300">
                </textarea>

            </div>

            <div class="mb-3">

                <label class="form-label"> Due Date </label>

                <input
                    type="date"
                    id="deliveryDate"
                    class="form-control"
                    min="2026-07-01"
                    max="2030-12-31"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label"> Priority </label>

                <!-- Dropdown select for commission priority, with Bootstrap's form-select class for styling and an ID for JavaScript targeting. -->

                <select
                    class="form-select"
                    id="priority"
                    aria-label="Priority">

                    <option value="High">
                        High
                    </option>

                    <option value="Medium">
                        Medium
                    </option>

                    <option value="Low">
                        Low
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-dark">

                Add Commission

            </button>

            </form>

            <hr>

            <div class="row text-center"> <!-- Row for displaying commission statistics, with centered text. -->

                <div class="col-md-4">

                    <h4>Total</h4>

                    <p id="totalCount">0</p>

                </div>

                <div class="col-md-4">

                    <h4>Pending</h4>

                    <p id="pendingCount">0</p>

                </div>

                <div class="col-md-4">

                    <h4>Completed</h4>

                    <p id="completedCount">0</p> <!-- Paragraph for displaying the count of completed commissions, with an ID for JavaScript targeting. -->

                </div>

            </div>

            <hr>

            <div class="row mb-3">

                <div class="col-md-6">

                    <label class="form-label"> <!-- Label for the status filter dropdown, with Bootstrap's form-label class. -->
                        Filter Status
                    </label>

            <!-- Dropdown select for filtering commissions by status, with Bootstrap's form-select class for styling and an ID for JavaScript targeting. -->
        
            <div class="row mb-3">

                <div class="col-md-4">

                    <label class="form-label">

                    Filter Status

                    </label>

                    <select
                        id="statusFilter"
                        class="form-select"
                        aria-label="Filter Status">

                        <option value="All">All</option>

                        <option value="Pending">Pending</option>

                        <option value="Completed">Completed</option>

                    </select>

                </div>

                <div class="col-md-4">

                    <label class="form-label">

                        Filter Priority

                    </label>

                    <select
                        id="priorityFilter"
                        class="form-select"
                        aria-label="Filter Priority">

                        <option value="All">All Priorities</option>

                        <option value="High">High</option>

                        <option value="Medium">Medium</option>

                        <option value="Low">Low</option>

                    </select>

                </div>

                <!-- Dropdown select for sorting commissions, with Bootstrap's form-select class for styling and an ID for JavaScript targeting. -->

                <div class="col-md-4">

                    <label class="form-label">

                        Sort By

                    </label>

                    <select
                        id="sortOption"
                        class="form-select"
                        aria-label="Sort By">

                        <option value="date">
                            Delivery Date
                        </option>

                        <option value="name">
                            Client Name
                        </option>

                    </select>

                </div>

            </div>

        <table class="table table-bordered"> <!-- Table for displaying client commissions, with Bootstrap's table and table-bordered classes for styling. -->

            <thead>

                <tr>

                    <th> Client </th>

                    <th> Description </th>

                    <th> Due Date </th>

                    <th> Priority </th>

                    <th> Status </th>

                    <th class="actions-column"> Actions </th>

                </tr>

            </thead>

            <tbody id="commissionTableBody"> <!-- Table body where commission rows will be dynamically inserted by JavaScript. -->

            </tbody>

            </table>

        </section>

    </main>

    <footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

</body>

</html>

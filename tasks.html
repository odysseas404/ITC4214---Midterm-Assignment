<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="This website serves as a portfolio for Odysseas Ampatzis' photography.">

  <title>Escapism - Commissions</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          defer></script>

  <!-- JS -->
  <script src="assets/js/common.js"
          defer></script>

  <script src="assets/js/tasks.js" defer></script>
</head>

<body>

    <header></header>

    <main>

      <main class="container py-5">

    <section class="content-box">

        <h1 class="text-center mb-4">
            Client Commissions
        </h1>

        <form id="commissionForm">

            <div class="mb-3">

                <label class="form-label">
                    Client Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    id="clientName"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Commission Description
                </label>

                <textarea
                    class="form-control"
                    id="description"
                    rows="3"
                    required></textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Delivery Date
                </label>

                <input
                    type="date"
                    class="form-control"
                    id="dueDate"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Priority
                </label>

                <select
                    class="form-select"
                    id="priority">

                    <option value="High">
                        High
                    </option>

                    <option value="Medium">
                        Medium
                    </option>

                    <option value="Low">
                        Low
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-dark">

                Add Commission

            </button>

        </form>

        <hr>

        <div class="row text-center">

            <div class="col-md-4">

                <h4>Total</h4>

                <p id="totalCount">0</p>

            </div>

            <div class="col-md-4">

                <h4>Pending</h4>

                <p id="pendingCount">0</p>

            </div>

            <div class="col-md-4">

                <h4>Completed</h4>

                <p id="completedCount">0</p>

            </div>

        </div>

        <hr>

        <div class="row mb-3">

            <div class="col-md-6">

                <label class="form-label">
                    Filter Status
                </label>

                <select
                    id="statusFilter"
                    class="form-select">

                    <option value="All">
                        All
                    </option>

                    <option value="Pending">
                        Pending
                    </option>

                    <option value="Completed">
                        Completed
                    </option>

                </select>

            </div>

            <div class="col-md-6">

                <label class="form-label">
                    Sort By
                </label>

                <select
                    id="sortOption"
                    class="form-select">

                    <option value="date">
                        Delivery Date
                    </option>

                    <option value="name">
                        Client Name
                    </option>

                </select>

            </div>

        </div>

        <table class="table table-bordered">

            <thead>

                <tr>

                    <th>Client</th>

                    <th>Description</th>

                    <th>Date</th>

                    <th>Priority</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="commissionTableBody">

            </tbody>

        </table>

    </section>

</main>

    <footer></footer>

</body>

</html>

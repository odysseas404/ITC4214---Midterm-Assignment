<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="This website serves as a portfolio for Odysseas Ampatzis' photography.">

  <title>Escapism - Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- JS -->
  <script src="assets/js/common.js"
          defer></script>
        
  <script
    src="assets/js/contact.js"
    defer>
  </script>

</head>

<body>

  <header></header>

  <main class="container py-5">

    <section class="content-box mb-5">

      <h1>Contact Escapism</h1>

      <p>

      Interested in a photography commission or collaboration?
      Fill out the form below and I will get back to you as soon as possible.

      </p>

    </section>

    <section class="content-box mb-5">

      <h2>Contact Form</h2>

      <form id="contactForm">

        <div class="mb-3">

          <!-- Label for the name input field, with Bootstrap's form-label class for styling. -->

          <label for="name" class="form-label">

            Name

          </label>

          <!-- Text input for the user's name, with Bootstrap's form-control class for styling and an ID for JavaScript targeting. -->

          <input
            type="text"
            id="name"
            class="form-control"
            aria-label="Name"
            required
            maxlength="50"
            pattern="[A-Za-z\s'-]+"
            title="Please enter a valid name. Only letters, spaces, hyphens, and apostrophes are allowed.">

        </div>

        <div class="mb-3">

          <label for="email" class="form-label">

            Email

          </label>

          <input
              type="email"
              id="email"
              class="form-control"
              aria-label="Email"
              required>

        </div>

        <div class="mb-3">

          <label for="subject" class="form-label">

            Subject

          </label>

          <input
              type="text"
              id="subject"
              class="form-control"
              aria-label="Subject"
              required
              maxlength="100">

        </div>

        <div class="mb-3">

          <label for="message" class="form-label">

            Message

          </label>

          <textarea
              id="message"
              class="form-control"
              aria-label="Message"
              rows="5"
              required
              maxlength="500"></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-dark">

            Send Message

        </button>

      </form>

    </section>

    <!-- Confirmation Modal for displaying a message after form submission, using Bootstrap's modal component. -->

    <div
      class="modal fade"
      id="confirmationModal"
      tabindex="-1">

      <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Message Sent

                </h5>

            </div>

            <div class="modal-body">

                <p id="confirmationText"></p>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

      </div>

    </div>

    <section class="content-box mb-5">

      <h2>Location</h2>

      <!-- Embedded Google Map showing the location of Escapism, with a title for accessibility and lazy loading for performance. -->

      <iframe
          title="Google Maps Location of Escapism"
          src="https://www.google.com/maps?q=Athens,Greece&output=embed"
          width="100%"
          height="450"
          style="border:0;"
          loading="lazy">

      </iframe>

    </section>

    <!-- Social Media Section with links to Instagram, Facebook, and X (formerly Twitter), using Bootstrap Icons for visual representation. -->

    <section class="content-box text-center">

      <h2>Follow Escapism</h2>

      <div class="mt-4">

        <a
            href="https://instagram.com"
            target="_blank"
            alt="Instagram"
            rel="noopener noreferrer"
            class="mx-3 social-icon">

            <i class="bi bi-instagram fs-1"></i>

        </a>

        <a
            href="https://facebook.com"
            target="_blank"
            alt="Facebook"
            rel="noopener noreferrer"
            class="mx-3 social-icon">

            <i class="bi bi-facebook fs-1"></i>

        </a>

        <a
            href="https://x.com"
            target="_blank"
            alt="X"
            rel="noopener noreferrer"
            class="mx-3 social-icon">

            <i class="bi bi-twitter-x fs-1"></i>

        </a>

      </div>

    </section>

  </main>

  <footer></footer>

<!-- Bootstrap JS Bundle for interactive components like modals, with Popper.js included. -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

</body>

</html>
